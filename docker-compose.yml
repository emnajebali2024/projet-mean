services:

  # =========================
  # 🟢 MONGODB
  # =========================
  mongodb:
    image: mongo:7.0
    container_name: medicare_mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_DATABASE: medical_db

    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro

    ports:
      - "27017:27017"

    networks:
      - medicare_network


  # =========================
  # 🔵 BACKEND
  # =========================
  backend:
    build:
      context: ./backend

    container_name: medicare_backend
    restart: unless-stopped

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/medical_db
      JWT_SECRET: medicalAppSecretKey2024!XyZ
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development

    ports:
      - "5001:5000"

    volumes:
      - ./backend/uploads:/app/uploads

    depends_on:
      - mongodb

    networks:
      - medicare_network


  # =========================
  # 🟣 FRONTEND (NGINX)
  # =========================
  frontend:
    build:
      context: ./frontend

    container_name: medicare_frontend
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - medicare_network


# =========================
# 💾 VOLUMES
# =========================
volumes:
  mongodb_data:


# =========================
# 🌐 NETWORK
# =========================
networks:
  medicare_network:
    driver: bridge